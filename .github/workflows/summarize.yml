name: Summarize and Categorize Knowledge Links

on:
  schedule:
    # Runs daily at 06:00 UTC, which is 08:00 in Germany during summer time.
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'input/links-to-summarize.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Pick daily topics
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/daily_pick.py
      - name: Validate environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Provider selection:"
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "  → Using Gemini API (GITHUB_TOKEN not set)"
          else
            echo "  → Using GitHub Models (GITHUB_TOKEN available)"
          fi
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "  → No Gemini fallback (GEMINI_API_KEY not set)"
          else
            echo "  → Gemini fallback available"
          fi
      - name: Run processing script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_MODEL: openai/gpt-4.1
          GITHUB_RETRY_ATTEMPTS: '4'
          GITHUB_RETRY_BASE_DELAY_SEC: '1.5'
          GITHUB_RETRY_MAX_DELAY_SEC: '20'
        run: python scripts/process_links.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add knowledge/ input/links-to-summarize.md input/daily-processed.md README.md || true
          git diff --staged --quiet || (git commit -m "docs: Auto-generate knowledge base" && git pull --rebase && git push)
